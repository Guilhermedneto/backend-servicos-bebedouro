name: Deploy backend — Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências e validar imports
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import app.main"

      - name: Empacotar artefato
        run: zip -r deploy.zip app requirements.txt

      - name: Deploy no Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-bebedouro-backend
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip
